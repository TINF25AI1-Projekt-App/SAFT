name: Release APK

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set tag name
        run: echo "TAG_NAME=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build APK
        run: ./gradlew :app:clean :app:assembleRelease --no-daemon

      - name: Grab output
        id: apk
        run: |
          FILE=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          echo "file=$FILE" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: ${{ steps.apk.outputs.file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
